<!DOCTYPE html>
<html>
<head>
  <title>Try On</title>

  <!-- MediaPipe -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
    }
  </style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// 🔥 Load Earring (Shopify OR Local)
const earring = new Image();
const params = new URLSearchParams(window.location.search);
const productImage = params.get("image");

if (productImage) {
  earring.src = productImage; // Shopify product image
} else {
  earring.src = "assets/earring.png"; // Local fallback
}

// 🔹 Smoothing
let smoothLeftX = 0, smoothLeftY = 0;
let smoothRightX = 0, smoothRightY = 0;

// 🔹 FaceMesh Setup
const faceMesh = new FaceMesh({
  locateFile: (file) =>
    `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
});

faceMesh.setOptions({
  maxNumFaces: 1,
  refineLandmarks: true,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.7
});

// 🔹 On Results
faceMesh.onResults(results => {

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (results.multiFaceLandmarks.length > 0) {

    const landmarks = results.multiFaceLandmarks[0];

    const leftEar = landmarks[234];
    const rightEar = landmarks[454];

    const x1 = leftEar.x * canvas.width;
    const y1 = leftEar.y * canvas.height;

    const x2 = rightEar.x * canvas.width;
    const y2 = rightEar.y * canvas.height;

    // 🔹 Smooth tracking
    smoothLeftX = smoothLeftX * 0.7 + x1 * 0.3;
    smoothLeftY = smoothLeftY * 0.7 + y1 * 0.3;

    smoothRightX = smoothRightX * 0.7 + x2 * 0.3;
    smoothRightY = smoothRightY * 0.7 + y2 * 0.3;

    // 🔹 Size based on face
    const faceWidth = Math.abs(leftEar.x - rightEar.x) * canvas.width;
    const size = faceWidth * 0.20;

    // 🔹 Head tilt rotation
    const angle = Math.atan2(
      rightEar.y - leftEar.y,
      rightEar.x - leftEar.x
    );

    // 🔹 Position adjustment
    const offsetX = size * 0.3;
    const offsetY = size * 0.1;

    // 🔥 LEFT EARRING
    ctx.save();
    ctx.translate(smoothLeftX - offsetX, smoothLeftY + offsetY);
    ctx.rotate(angle);
    ctx.drawImage(earring, -size/2, -size/2, size, size);
    ctx.restore();

    // 🔥 RIGHT EARRING
    ctx.save();
    ctx.translate(smoothRightX + offsetX, smoothRightY + offsetY);
    ctx.rotate(angle);
    ctx.drawImage(earring, -size/2, -size/2, size, size);
    ctx.restore();
  }
});

// 🔹 Camera Start
navigator.mediaDevices.getUserMedia({
  video: { facingMode: "user" }
})
.then(stream => {
  video.srcObject = stream;

  video.onloadedmetadata = () => {
    video.play();

    const camera = new Camera(video, {
      onFrame: async () => {
        await faceMesh.send({ image: video });
      }
    });

    camera.start();
  };
})
.catch(err => {
  alert("Camera access denied. Please allow camera.");
  console.log(err);
});
</script>

</body>
</html>
