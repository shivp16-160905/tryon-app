<!DOCTYPE html>
<html>
<head>
  <title>Try On</title>

  <!-- MediaPipe -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }

    video {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1); /* mirror */
    }

    canvas {
      position: absolute;
      pointer-events: none;
      transform: scaleX(-1); /* match mirror */
    }
  </style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// 🔥 LOAD IMAGE (for now single earring)
const earring = new Image();
earring.src = "https://i.imgur.com/7k12EPD.png";

let imageLoaded = false;
earring.onload = () => {
  imageLoaded = true;
  console.log("✅ Image Loaded");
};

// 🔹 smoothing variables
let lx = 0, ly = 0, rx = 0, ry = 0;

// 🔹 FaceMesh setup
const faceMesh = new FaceMesh({
  locateFile: (file) =>
    `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
});

faceMesh.setOptions({
  maxNumFaces: 1,
  refineLandmarks: true,
  minDetectionConfidence: 0.6,
  minTrackingConfidence: 0.6
});

// 🔥 RESULT
faceMesh.onResults(results => {

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!results.multiFaceLandmarks || 
      results.multiFaceLandmarks.length === 0 || 
      !imageLoaded) {
    return;
  }

  const lm = results.multiFaceLandmarks[0];

  // 🔥 BETTER EAR POSITION (3-point average)
  const leftX = (lm[234].x + lm[93].x + lm[132].x) / 3;
  const leftY = (lm[234].y + lm[93].y + lm[132].y) / 3;

  const rightX = (lm[454].x + lm[323].x + lm[361].x) / 3;
  const rightY = (lm[454].y + lm[323].y + lm[361].y) / 3;

  const x1 = leftX * canvas.width;
  const y1 = leftY * canvas.height;

  const x2 = rightX * canvas.width;
  const y2 = rightY * canvas.height;

  // 🔴 DEBUG DOTS
  ctx.fillStyle = "red";
  ctx.fillRect(x1, y1, 6, 6);
  ctx.fillRect(x2, y2, 6, 6);

  // 🔹 smoothing
  lx = lx * 0.7 + x1 * 0.3;
  ly = ly * 0.7 + y1 * 0.3;

  rx = rx * 0.7 + x2 * 0.3;
  ry = ry * 0.7 + y2 * 0.3;

  // 🔹 dynamic size
  const faceWidth = Math.abs(x1 - x2);
  const size = Math.max(faceWidth * 0.35, 80);

  // 🔹 offset (important)
  const offsetY = size * 0.5;

  // 🔥 DRAW EARRINGS
  ctx.drawImage(earring, lx - size/2, ly + offsetY, size, size);
  ctx.drawImage(earring, rx - size/2, ry + offsetY, size, size);
});


// 🔥 START CAMERA + LOOP (STABLE)
navigator.mediaDevices.getUserMedia({
  video: { facingMode: "user" }
})
.then(stream => {
  video.srcObject = stream;

  video.onloadedmetadata = () => {
    video.play();

    async function detect() {
      await faceMesh.send({ image: video });
      requestAnimationFrame(detect);
    }

    detect();
  };
})
.catch(err => {
  alert("Camera access denied");
  console.log(err);
});
</script>

</body>
</html>
