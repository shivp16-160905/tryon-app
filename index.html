<!DOCTYPE html>
<html>
<head>
  <title>Try On</title>

  <!-- MediaPipe -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }

    video {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    canvas {
      position: absolute;
      pointer-events: none;
    }
  </style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// ✅ USE ONLINE IMAGE FIRST (to confirm rendering works)
const leftEarring = new Image();
const rightEarring = new Image();

// 🔥 IMPORTANT: use SAME image for testing
leftEarring.src = "https://i.imgur.com/7k12EPD.png";
rightEarring.src = "https://i.imgur.com/7k12EPD.png";

let imagesLoaded = false;

leftEarring.onload = () => {
  rightEarring.onload = () => {
    imagesLoaded = true;
    console.log("✅ Images Loaded");
  };
};

// smoothing
let smoothLX=0, smoothLY=0, smoothRX=0, smoothRY=0;

// FaceMesh
const faceMesh = new FaceMesh({
  locateFile: (file) =>
    `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
});

faceMesh.setOptions({
  maxNumFaces: 1,
  refineLandmarks: true,
  minDetectionConfidence: 0.5,
  minTrackingConfidence: 0.5
});

// RESULTS
faceMesh.onResults(results => {

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  if (!results.multiFaceLandmarks || 
      results.multiFaceLandmarks.length === 0 || 
      !imagesLoaded) return;

  const lm = results.multiFaceLandmarks[0];

  // ear positions
  const leftX = (lm[234].x + lm[93].x)/2;
  const leftY = (lm[234].y + lm[132].y)/2;

  const rightX = (lm[454].x + lm[323].x)/2;
  const rightY = (lm[454].y + lm[361].y)/2;

  const x1 = leftX * canvas.width;
  const y1 = leftY * canvas.height;

  const x2 = rightX * canvas.width;
  const y2 = rightY * canvas.height;

  // debug dots
  ctx.fillStyle = "red";
  ctx.fillRect(x1, y1, 8, 8);
  ctx.fillRect(x2, y2, 8, 8);

  // smoothing
  smoothLX = smoothLX*0.7 + x1*0.3;
  smoothLY = smoothLY*0.7 + y1*0.3;

  smoothRX = smoothRX*0.7 + x2*0.3;
  smoothRY = smoothRY*0.7 + y2*0.3;

  const faceWidth = Math.abs(leftX - rightX) * canvas.width;
  const size = Math.max(faceWidth * 0.25, 80);

  // 🔥 SIMPLE DRAW (no rotation for now)
  ctx.drawImage(leftEarring, smoothLX - size/2, smoothLY, size, size);
  ctx.drawImage(rightEarring, smoothRX - size/2, smoothRY, size, size);
});

// CAMERA
navigator.mediaDevices.getUserMedia({
  video: { facingMode: "user" }
})
.then(stream => {
  video.srcObject = stream;

  video.onloadedmetadata = () => {
    video.play();

    const camera = new Camera(video, {
      onFrame: async () => {
        await faceMesh.send({ image: video });
      }
    });

    camera.start();
  };
})
.catch(err => {
  alert("Camera access denied");
});
</script>

</body>
</html>
