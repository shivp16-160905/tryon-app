<!DOCTYPE html>
<html>
<head>
  <title>Try On</title>

  <!-- MediaPipe -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }
    canvas {
      position: absolute;
      top: 0;
      left: 0;
    }
  </style>
</head>

<body>

<video id="video" autoplay playsinline style="display:none;"></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// 👉 Replace with your own earring PNG later
const earring = new Image();
const params = new URLSearchParams(window.location.search);
const productImage = params.get("image");

if (productImage) {
  earring.src = productImage;
} else {
  earring.src = "https://i.imgur.com/7k12EPD.png";
}
// 👉 Smoothing variables
let smoothLeftX = 0;
let smoothLeftY = 0;
let smoothRightX = 0;
let smoothRightY = 0;

// Setup FaceMesh
const faceMesh = new FaceMesh({
  locateFile: (file) =>
    `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
});

faceMesh.setOptions({
  maxNumFaces: 1,
  refineLandmarks: true,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.7
});

// When results come
faceMesh.onResults(results => {

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  // Draw camera feed
  ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

  if (results.multiFaceLandmarks.length > 0) {

    const landmarks = results.multiFaceLandmarks[0];

    const leftEar = landmarks[234];
    const rightEar = landmarks[454];

    const x1 = leftEar.x * canvas.width;
    const y1 = leftEar.y * canvas.height;

    const x2 = rightEar.x * canvas.width;
    const y2 = rightEar.y * canvas.height;

    // 👉 Smooth movement
    smoothLeftX = smoothLeftX * 0.7 + x1 * 0.3;
    smoothLeftY = smoothLeftY * 0.7 + y1 * 0.3;

    smoothRightX = smoothRightX * 0.7 + x2 * 0.3;
    smoothRightY = smoothRightY * 0.7 + y2 * 0.3;

    // 👉 Dynamic size based on face width
    const faceWidth = Math.abs(leftEar.x - rightEar.x) * canvas.width;
    const size = faceWidth * 0.18;

    // 👉 Draw earrings
    ctx.drawImage(
      earring,
      smoothLeftX - size / 2,
      smoothLeftY - size / 2,
      size,
      size
    );

    ctx.drawImage(
      earring,
      smoothRightX - size / 2,
      smoothRightY - size / 2,
      size,
      size
    );
  }
});

// Start camera
navigator.mediaDevices.getUserMedia({
  video: {
    facingMode: "user"   // 👈 IMPORTANT
  }
})
.then(stream => {
  video.srcObject = stream;
  video.play();

  const camera = new Camera(video, {
    onFrame: async () => {
      await faceMesh.send({ image: video });
    },
    width: 480,
    height: 640
  });

  camera.start();
})
.catch(err => {
  alert("Camera access denied or not working");
  console.log(err);
});
</script>

</body>
</html>
