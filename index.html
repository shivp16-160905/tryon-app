<!DOCTYPE html>
<html>
<head>
  <title>Try On</title>

  <!-- MediaPipe -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
    }
  </style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// 🔥 Get product image from URL
const earring = new Image();
const params = new URLSearchParams(window.location.search);
const productImage = params.get("image");

earring.src = productImage ? productImage : "https://i.imgur.com/7k12EPD.png";

// 🔹 Smoothing
let smoothLeftX = 0, smoothLeftY = 0;
let smoothRightX = 0, smoothRightY = 0;

// 🔹 Setup FaceMesh
const faceMesh = new FaceMesh({
  locateFile: (file) =>
    `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
});

faceMesh.setOptions({
  maxNumFaces: 1,
  refineLandmarks: true,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.7
});

// 🔹 When face detected
faceMesh.onResults(results => {

  // ✅ Match canvas to video size
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  // ❌ DO NOT DRAW VIDEO HERE (important fix)
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (results.multiFaceLandmarks.length > 0) {

    const landmarks = results.multiFaceLandmarks[0];

    const leftEar = landmarks[234];
    const rightEar = landmarks[454];

    const x1 = leftEar.x * canvas.width;
    const y1 = leftEar.y * canvas.height;

    const x2 = rightEar.x * canvas.width;
    const y2 = rightEar.y * canvas.height;

    // 🔹 Smooth movement
    smoothLeftX = smoothLeftX * 0.7 + x1 * 0.3;
    smoothLeftY = smoothLeftY * 0.7 + y1 * 0.3;

    smoothRightX = smoothRightX * 0.7 + x2 * 0.3;
    smoothRightY = smoothRightY * 0.7 + y2 * 0.3;

    // 🔹 Dynamic size
    const faceWidth = Math.abs(leftEar.x - rightEar.x) * canvas.width;
    const size = faceWidth * 0.18;

    // 🔹 Draw earrings
    ctx.drawImage(earring, smoothLeftX - size/2, smoothLeftY - size/2, size, size);
    ctx.drawImage(earring, smoothRightX - size/2, smoothRightY - size/2, size, size);
  }
});

// 🔹 Start Camera
navigator.mediaDevices.getUserMedia({
  video: { facingMode: "user" }
})
.then(stream => {
  video.srcObject = stream;
  video.onloadedmetadata = () => {
    video.play();

    const camera = new Camera(video, {
      onFrame: async () => {
        await faceMesh.send({ image: video });
      }
    });

    camera.start();
  };
})
.catch(err => {
  alert("Camera access denied. Please allow camera.");
  console.log(err);
});
</script>

</body>
</html>
