<!DOCTYPE html>
<html>
<head>
  <title>Try On</title>

  <!-- MediaPipe -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }

    video {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    canvas {
      position: absolute;
      pointer-events: none;
    }
  </style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// ✅ Use ONLINE image first (to remove path issues)
const earring = new Image();
earring.src = "https://i.imgur.com/7k12EPD.png";

let imageLoaded = false;
earring.onload = () => {
  imageLoaded = true;
  console.log("✅ Image Loaded");
};

// 🔹 FaceMesh setup
const faceMesh = new FaceMesh({
  locateFile: (file) =>
    `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
});

faceMesh.setOptions({
  maxNumFaces: 1,
  refineLandmarks: true,
  minDetectionConfidence: 0.5,
  minTrackingConfidence: 0.5
});

// 🔥 RESULT
faceMesh.onResults(results => {

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) {
    console.log("❌ No face detected");
    return;
  }

  if (!imageLoaded) return;

  console.log("✅ Face detected");

  const lm = results.multiFaceLandmarks[0];

  // 🎯 Ear points
  const left = lm[234];
  const right = lm[454];

  const x1 = left.x * canvas.width;
  const y1 = left.y * canvas.height;

  const x2 = right.x * canvas.width;
  const y2 = right.y * canvas.height;

  // 🔴 DEBUG DOTS
  ctx.fillStyle = "red";
  ctx.fillRect(x1, y1, 10, 10);
  ctx.fillRect(x2, y2, 10, 10);

  const size = 100;

  // 🔥 DRAW EARRINGS (simple)
  ctx.drawImage(earring, x1 - size/2, y1, size, size);
  ctx.drawImage(earring, x2 - size/2, y2, size, size);
});


// 🔥 START CAMERA + LOOP (NO Camera() used)
navigator.mediaDevices.getUserMedia({
  video: { facingMode: "user" }
})
.then(stream => {
  video.srcObject = stream;

  video.onloadedmetadata = () => {
    video.play();

    async function detect() {
      await faceMesh.send({ image: video });
      requestAnimationFrame(detect);
    }

    detect(); // 🔥 KEY LINE
  };
})
.catch(err => {
  alert("Camera access denied");
  console.log(err);
});
</script>

</body>
</html>
