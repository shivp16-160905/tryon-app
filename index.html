<!DOCTYPE html>
<html>
<head>
  <title>Try On</title>

  <!-- MediaPipe -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
    }
  </style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// 🔥 Load image (Shopify OR Local)
const earring = new Image();
const params = new URLSearchParams(window.location.search);
const productImage = params.get("image");

if (productImage) {
  earring.src = productImage;
} else {
  earring.src = "assets/earring.png";
}

// 🔹 Smooth variables
let smoothLeftX = 0, smoothLeftY = 0;
let smoothRightX = 0, smoothRightY = 0;

// 🔹 FaceMesh
const faceMesh = new FaceMesh({
  locateFile: (file) =>
    `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
});

faceMesh.setOptions({
  maxNumFaces: 1,
  refineLandmarks: true,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.7
});

// 🔹 On Results
faceMesh.onResults(results => {

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (results.multiFaceLandmarks.length > 0) {

    const landmarks = results.multiFaceLandmarks[0];

    // 🔥 IMPROVED EAR POSITION (KEY FIX)
    const leftEarX = (landmarks[234].x + landmarks[93].x) / 2;
    const leftEarY = (landmarks[234].y + landmarks[132].y) / 2;

    const rightEarX = (landmarks[454].x + landmarks[323].x) / 2;
    const rightEarY = (landmarks[454].y + landmarks[361].y) / 2;

    const x1 = leftEarX * canvas.width;
    const y1 = leftEarY * canvas.height;

    const x2 = rightEarX * canvas.width;
    const y2 = rightEarY * canvas.height;

    // 🔹 Smooth tracking
    smoothLeftX = smoothLeftX * 0.7 + x1 * 0.3;
    smoothLeftY = smoothLeftY * 0.7 + y1 * 0.3;

    smoothRightX = smoothRightX * 0.7 + x2 * 0.3;
    smoothRightY = smoothRightY * 0.7 + y2 * 0.3;

    // 🔹 Size based on face
    const faceWidth = Math.abs(leftEarX - rightEarX) * canvas.width;
    const size = Math.max(faceWidth * 0.18, 70);

    // 🔹 Head rotation
    const angle = Math.atan2(
      rightEarY - leftEarY,
      rightEarX - leftEarX
    );

    // 🔥 FINAL OFFSETS (CALIBRATED)
    const offsetX = size * 0.25;
    const offsetY = size * 0.35;

    // 🔥 LEFT EARRING
    ctx.save();
    ctx.translate(smoothLeftX - offsetX, smoothLeftY + offsetY);
    ctx.rotate(angle);
    ctx.drawImage(earring, -size/2, -size/2, size, size);
    ctx.restore();

    // 🔥 RIGHT EARRING
    ctx.save();
    ctx.translate(smoothRightX + offsetX, smoothRightY + offsetY);
    ctx.rotate(angle);
    ctx.drawImage(earring, -size/2, -size/2, size, size);
    ctx.restore();
  }
});

// 🔹 Camera Start
navigator.mediaDevices.getUserMedia({
  video: { facingMode: "user" }
})
.then(stream => {
  video.srcObject = stream;

  video.onloadedmetadata = () => {
    video.play();

    const camera = new Camera(video, {
      onFrame: async () => {
        await faceMesh.send({ image: video });
      }
    });

    camera.start();
  };
})
.catch(err => {
  alert("Camera access denied. Please allow camera.");
  console.log(err);
});
</script>

</body>
</html>
