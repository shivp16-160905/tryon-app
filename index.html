<!DOCTYPE html>
<html>
<head>
  <title>Try On</title>

  <!-- MediaPipe -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }

    video {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    canvas {
      position: absolute;
      pointer-events: none;
    }
  </style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// 🔥 LOAD LEFT & RIGHT IMAGES WITH FIX
const leftEarring = new Image();
const rightEarring = new Image();

let imagesLoaded = 0;

function checkLoaded() {
  imagesLoaded++;
}

leftEarring.onload = checkLoaded;
rightEarring.onload = checkLoaded;

// 👉 LOCAL FILES
leftEarring.src = "assets/left.png";
rightEarring.src = "assets/right.png";

// 🔹 smoothing
let smoothLX=0, smoothLY=0, smoothRX=0, smoothRY=0;

// 🔹 FaceMesh
const faceMesh = new FaceMesh({
  locateFile: (file) =>
    `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
});

faceMesh.setOptions({
  maxNumFaces: 1,
  refineLandmarks: true,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.7
});

// 🔹 RESULT
faceMesh.onResults(results => {

  // ❗ WAIT UNTIL IMAGES LOAD
  if (imagesLoaded < 2) return;

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  if (results.multiFaceLandmarks.length > 0) {

    const lm = results.multiFaceLandmarks[0];

    // 🔥 BETTER EAR POSITION
    const leftX = (lm[234].x + lm[93].x)/2;
    const leftY = (lm[234].y + lm[132].y)/2;

    const rightX = (lm[454].x + lm[323].x)/2;
    const rightY = (lm[454].y + lm[361].y)/2;

    const x1 = leftX * canvas.width;
    const y1 = leftY * canvas.height;

    const x2 = rightX * canvas.width;
    const y2 = rightY * canvas.height;

    // 🔹 smoothing
    smoothLX = smoothLX*0.7 + x1*0.3;
    smoothLY = smoothLY*0.7 + y1*0.3;

    smoothRX = smoothRX*0.7 + x2*0.3;
    smoothRY = smoothRY*0.7 + y2*0.3;

    // 🔹 size
    const faceWidth = Math.abs(leftX - rightX) * canvas.width;
    const size = Math.max(faceWidth * 0.18, 70);

    // 🔹 rotation
    const angle = Math.atan2(rightY-leftY, rightX-leftX);

    // 🔹 offsets
    const offsetX = size * 0.25;
    const offsetY = size * 0.35;

    // 🔥 LEFT
    ctx.save();
    ctx.translate(smoothLX - offsetX, smoothLY + offsetY);
    ctx.rotate(angle);
    ctx.drawImage(leftEarring, -size/2, -size/2, size, size);
    ctx.restore();

    // 🔥 RIGHT
    ctx.save();
    ctx.translate(smoothRX + offsetX, smoothRY + offsetY);
    ctx.rotate(angle);
    ctx.drawImage(rightEarring, -size/2, -size/2, size, size);
    ctx.restore();
  }
});

// 🔹 CAMERA
navigator.mediaDevices.getUserMedia({
  video: { facingMode: "user" }
})
.then(stream => {
  video.srcObject = stream;

  video.onloadedmetadata = () => {
    video.play();

    const camera = new Camera(video, {
      onFrame: async () => {
        await faceMesh.send({ image: video });
      }
    });

    camera.start();
  };
})
.catch(err => {
  alert("Camera access denied");
});
</script>

</body>
</html>
